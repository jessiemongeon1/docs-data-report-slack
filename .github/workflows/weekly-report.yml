name: Weekly analytics report

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run report pipeline
        env:
          PLAUSIBLE_API_KEY: ${{ secrets.PLAUSIBLE_API_KEY }}
          KAPA_API_KEY_SUI: ${{ secrets.KAPA_API_KEY_SUI }}
          KAPA_API_KEY_WALRUS: ${{ secrets.KAPA_API_KEY_WALRUS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SITES_JSON: ${{ secrets.SITES_JSON }}
          REPORT_BASE_URL: ${{ secrets.REPORT_BASE_URL }}
        run: python -m app.main

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-analytics-artifacts
          path: artifacts/

      - name: Upload site for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: build-report
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
