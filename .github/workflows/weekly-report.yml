name: Weekly analytics report

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
        
      - run: pip install -r requirements.txt
      
      - name: Run weekly report
        run: python -m app.main
        env:
          PLAUSIBLE_API_KEY: ${{ secrets.PLAUSIBLE_API_KEY }}
          KAPA_API_KEY_SUI: ${{ secrets.KAPA_API_KEY_SUI }}
          KAPA_API_KEY_WALRUS: ${{ secrets.KAPA_API_KEY_WALRUS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SITES_JSON: ${{ secrets.SITES_JSON }}
          CLAUDE_MAX_INPUT_TOKENS: ${{ secrets.CLAUDE_MAX_INPUT_TOKENS }}
        
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-html-reports
          path: reports
        
      - name: Commit reports
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add reports/
          git commit -m "Add weekly reports for ${{ github.run_id }}" || echo "No changes"
          git push
